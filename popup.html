<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SentenceMiner</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      width: 300px;
      background: #f6f7fb;
      color: #1e1e1e;
    }

    .header {
      background: #1e1e2e;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #7F77DD;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header h1 {
      color: white;
      font-size: 14px;
      font-weight: 500;
    }

    .version {
      font-size: 11px;
      color: #AFA9EC;
      background: #2e2e42;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 0.5px solid #e5e7eb;
    }

    .label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .capture-card {
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      border-left: 3px solid #7F77DD;
    }

    #status {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    #time {
      font-size: 11px;
      color: #6b7280;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #EEEDFE;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      color: #534AB7;
      font-weight: 500;
    }

    .step span {
      font-size: 12px;
      color: #6b7280;
    }

    kbd {
      background: #f3f4f6;
      border: 0.5px solid #d1d5db;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      font-family: monospace;
    }

    .footer {
      padding: 0 16px 14px;
      margin-top: 12px;
    }

    .status-bar {
      background: white;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dot-connected {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1D9E75;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-label {
      font-size: 12px;
      color: #6b7280;
    }

    .status-value {
      font-size: 12px;
      color: #0F6E56;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M2 8h8M2 12h10" stroke="white" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>
      <h1>SentenceMiner</h1>
    </div>
    <span class="version">v0.1.0</span>
  </div>

  <div class="section">
    <p class="label">Last captured</p>
    <div class="capture-card">
      <div id="status">No capture yet.</div>
      <div id="time"></div>
    </div>
  </div>

  <div class="section" style="border-bottom: none;">
    <p class="label">How to use</p>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div><span>Highlight any subtitle text</span>
      </div>
      <div class="step">
        <div class="step-num">2</div><span>Release mouse — auto saves</span>
      </div>
      <div class="step">
        <div class="step-num">3</div><span>Or press <kbd>Ctrl+Shift+S</kbd></span>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="status-bar">
      <div class="status-left">
        <div class="dot-connected"></div>
        <span class="status-label">Backend status</span>
      </div>
      <span class="status-value">Connected</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
